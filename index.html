<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delivery Exception Management Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="app-header">
    <div>
      <h1>Delivery Exception Management</h1>
      <p class="subtext">Internal Operations Dashboard (Version 1)</p>
    </div>
  </header>

  <main class="container">

    <section class="card">
      <h2 class="section-title">Report Delivery Exception </h2>

      <form id="exceptionForm" class="form-grid">
        <div class="form-group">
          <label for="deliveryId">Delivery ID <span class="req">*</span></label>
          <input type="text" id="deliveryId" placeholder="e.g. 25367420983" />
          <small class="error" id="deliveryIdError"></small>
        </div>

        <div class="form-group">
          <label for="customerName">Customer Name <span class="req">*</span></label>
          <input type="text" id="customerName" placeholder="e.g. XYZ" />
          <small class="error" id="customerNameError"></small>
        </div>

        <div class="form-group">
          <label for="issueType">Issue Type <span class="req">*</span></label>
          <select id="issueType">
            <option value="">-- Select Issue Type --</option>
            <option value="Address Not Found">Address Not Found</option>
            <option value="Customer Not Available">Customer Not Available</option>
            <option value="Payment Issue">Payment Issue</option>
            <option value="Package Damaged">Package Damaged</option>
          </select>
          <small class="error" id="issueTypeError"></small>
        </div>

        <div class="form-group">
          <label>Priority <span class="req">*</span></label>
          <div class="radio-row" id="priorityGroup">
            <label class="radio-pill">
              <input type="radio" name="priority" value="Low" />
              Low
            </label>
            <label class="radio-pill">
              <input type="radio" name="priority" value="Medium" />
              Medium
            </label>
            <label class="radio-pill high">
              <input type="radio" name="priority" value="High" />
              High
            </label>
          </div>
          <small class="error" id="priorityError"></small>
        </div>

        <div class="form-group full-width">
          <label for="notes">Notes (Optional)</label>
          <textarea id="notes" rows="3" placeholder="Additional Deatils "></textarea>
        </div>

        <div class="form-actions full-width">
          <button type="submit" class="btn primary">Submit </button>
          
        </div>
      </form>
    </section>

    <section class="card">
      <div class="dashboard-top">
        <h2 class="section-title">Exceptions Dashboard</h2>

        <div class="stats">
          <div class="stat-box">
            <span class="stat-label">Open</span>
            <span class="stat-value" id="openCount">0</span>
          </div>
          <div class="stat-box resolved">
            <span class="stat-label">Resolved</span>
            <span class="stat-value" id="resolvedCount">0</span>
          </div>
        </div>
      </div>

      <div class="filters">
        <div class="filter-group">
          <label for="filterIssueType">Filter by Issue Type</label>
          <select id="filterIssueType">
            <option value="All">All</option>
            <option value="Address Not Found">Address Not Found</option>
            <option value="Customer Not Available">Customer Not Available</option>
            <option value="Payment Issue">Payment Issue</option>
            <option value="Package Damaged">Package Damaged</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filterStatus">Filter by Status</label>
          <select id="filterStatus">
            <option value="All">All</option>
            <option value="Open">Open</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table class="exceptions-table">
          <thead>
            <tr>
              <th>Delivery ID</th>
              <th>Customer Name</th>
              <th>Issue Type</th>
              <th>Priority</th>
              <th>Status</th>
              <th style="width: 180px;">Actions</th>
            </tr>
          </thead>
          <tbody id="exceptionsTableBody">
           
          </tbody>
        </table>

        <p class="empty-state" id="emptyState">No exceptions reported yet.</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
